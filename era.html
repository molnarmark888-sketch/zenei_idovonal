<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono Boom // Archive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="c/era-base.css">
    <link id="dynamic-style" rel="stylesheet" href="">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false } }</script>
</head>
<body id="body-content" class="bg-[#050816] m-0 font-mono text-cyan-400 overflow-x-hidden">

    <canvas id="data-stream-canvas"></canvas>

    <div id="main-wrapper">
        
        <section id="hero-section" class="h-screen w-full flex items-center justify-center sticky top-0 z-20">
            <div id="main-visual-container" class="w-[65vw] aspect-video border border-cyan-500/20 bg-black overflow-hidden shadow-[0_0_100px_rgba(0,255,255,0.1)]">
                <img src="assets/intro-visual.jpg" id="hero-img" class="w-full h-full object-cover opacity-80 scale-110" alt="Kezdő Kép">
            </div>
        </section>

        <div class="h-[100vh] pointer-events-none"></div>

        <section id="final-panel-section" class="h-screen w-full flex items-center justify-center relative z-30 p-[5vw]">
            <div class="era-grid-container grid grid-cols-[1.2fr,0.8fr] gap-[5vw] w-full max-w-[1400px]">
                
                <div id="media-container" class="border border-cyan-500/30 bg-black aspect-video relative shadow-2xl">
                    <iframe id="video-frame" class="w-full h-full border-none" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>

                <div class="info-scroll flex flex-col justify-center">
                    <h1 id="year-display" class="year-outline text-[12rem] leading-none mb-4 text-transparent italic font-black">0000</h1>
                    <h2 id="title-display" class="text-3xl uppercase tracking-[0.5em] text-white mb-6">Korszak Címe</h2>
                    <div id="text-display" class="text-cyan-200/70 text-lg leading-relaxed mb-10">
                        </div>
                    <a href="map.html" class="back-btn self-start border border-cyan-500 px-8 py-3 text-[10px] tracking-[0.4em] uppercase no-underline hover:bg-cyan-500 hover:text-black transition-all">← Back to Space</a>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/era-data.js"></script>
</body>
</html>
